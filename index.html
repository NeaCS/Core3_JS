<!DOCTYPE html>

<head>

          <a href="#">link</a>

      <div class="post">

          <h2>Lina K.</h2>

          <div class="likes">
            <p>❤️<span class="cantidad-likes">0</span> like(s)</p>

            <button class="boton-like">Like</button>

        </div>

        <p>
          Acabo de terminar este
          <a href="#">nuevo comic</a>, denle un vistazo.
        </p>
      </div>

      <div class="post">

  <script src="./main.js"></script>
</body>

</html>
