<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Network</title>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <header class="navbar">
      <h1>Network</h1>
    </header>

    <main class="contenedor">
      <aside class="perfil">
        <img src="./img/user.png" alt="Usuario" class="imagen-perfil" />

        <a href="#">Add an avatar</a>
      </aside>

      <section class="feed">
        <h1>Your Feed</h1>

        <article class="post">
          <div class="post-superior">
            <h2>Linn O.</h2>

            <div class="likes">
              <p><span class="cantidad-likes">0</span> like(s)</p>

              <button class="boton-like">Like</button>
            </div>
          </div>

          <p>
            Acabo de configurar este nuevo bot de Discord, cuéntenme que opinan ustedes.
            <a href="#">link</a>
          </p>
        </article>

        <article class="post">
          <div class="post-superior">
            <h2>Lina K.</h2>

            <div class="likes">
              <p><span class="cantidad-likes">0</span> like(s)</p>

              <button class="boton-like">Like</button>
            </div>
          </div>

          <p>
            Acabo de terminar este
            <a href="#">nuevo comic</a>, denle un vistazo.
          </p>
        </article>

        <article class="post">
          <div class="post-superior">
            <h2>Mateo H.</h2>

            <div class="likes">
              <p><span class="cantidad-likes">0</span> like(s)</p>

              <button class="boton-like">Like</button>
            </div>
          </div>

          <p>
            No puedo dejar de escuchar este
            <a href="#">album</a>. ¿A quién más le gusta?
          </p>
        </article>
      </section>
    </main>
  </body>
</html>
